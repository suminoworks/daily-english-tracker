<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英作文トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F4EE;
  --ink: #1A1814;
  --ink2: #4A4640;
  --ink3: #9A9590;
  --teal: #2D7D6F;
  --teal-light: #E8F4F1;
  --amber: #C4841A;
  --amber-light: #FDF3E3;
  --red: #C0392B;
  --red-light: #FDECEA;
  --border: #E0DDD6;
  --card: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
  position: sticky; top: 0; z-index: 10;
}
.logo { font-family: 'Noto Serif JP', serif; font-size: 15px; color: var(--ink); font-weight: 500; }
.streak-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--amber-light);
  border: 1px solid #E8C88A;
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 500; color: var(--amber);
}
.streak-fire { font-size: 14px; }

/* Nav */
.nav {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
  position: sticky; top: 57px; z-index: 9;
}
.nav-btn {
  flex: 1; padding: 10px 0;
  font-size: 12px; font-weight: 500;
  color: var(--ink3);
  background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.nav-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

/* Content */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* Practice page */
.sentence-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.sentence-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ink3); margin-bottom: 10px;
}
.japanese-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px; line-height: 1.7;
  color: var(--ink);
}
.gen-btn {
  width: 100%; margin-top: 12px;
  padding: 8px; border-radius: 8px;
  border: 1px dashed var(--border);
  background: none; font-size: 12px; color: var(--ink3);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.gen-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.theme-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.theme-chip {
  font-size: 11px; padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--card); color: var(--ink2);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.theme-chip.selected { background: var(--teal); color: white; border-color: var(--teal); }
.theme-chip.review-chip { border-color: var(--amber); color: var(--amber); background: var(--amber-light); }
.theme-chip.review-chip.selected { background: var(--amber); color: white; border-color: var(--amber); }

.input-label { font-size: 11px; font-weight: 500; color: var(--ink3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
textarea {
  width: 100%; border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  font-family: 'DM Mono', monospace; font-size: 14px;
  background: var(--card); color: var(--ink);
  resize: none; min-height: 100px;
  outline: none; transition: border-color 0.15s;
  line-height: 1.6;
}
textarea:focus { border-color: var(--teal); }
textarea::placeholder { color: var(--ink3); font-style: italic; }

.submit-btn {
  width: 100%; margin-top: 12px;
  padding: 14px; border-radius: 12px;
  border: none;
  background: var(--ink); color: var(--cream);
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.submit-btn:hover { background: var(--teal); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Feedback card */
.feedback-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-top: 16px;
}
.feedback-section { margin-bottom: 16px; }
.feedback-section:last-child { margin-bottom: 0; }
.fb-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 8px;
}
.fb-label.correct { color: var(--teal); }
.fb-label.wrong { color: var(--red); }
.fb-label.model { color: var(--amber); }
.fb-label.phrase { color: #5B4FBE; }

.model-text {
  font-family: 'DM Mono', monospace; font-size: 14px;
  line-height: 1.6; color: var(--ink);
  background: var(--teal-light);
  padding: 12px; border-radius: 8px;
}
.error-text {
  font-size: 13px; line-height: 1.6; color: var(--ink2);
  background: var(--red-light);
  padding: 12px; border-radius: 8px;
}
.phrase-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.phrase-row:last-child { border-bottom: none; }
.phrase-en { font-family: 'DM Mono', monospace; color: var(--ink); flex: 1; }
.phrase-ja { color: var(--ink3); font-size: 12px; }

.save-btn {
  width: 100%; margin-top: 16px;
  padding: 12px; border-radius: 10px;
  border: 1px solid var(--teal);
  background: var(--teal-light); color: var(--teal);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.save-btn:hover { background: var(--teal); color: white; }
.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.next-btn {
  width: 100%; margin-top: 8px;
  padding: 12px; border-radius: 10px;
  border: 1px solid var(--border);
  background: none; color: var(--ink2);
  font-size: 13px; cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.next-btn:hover { border-color: var(--ink2); }
.result-row { display: flex; gap: 8px; margin-top: 16px; }
.result-btn {
  flex: 1; padding: 12px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.result-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.result-bad { border: 1px solid var(--red); background: var(--red-light); color: var(--red); }
.result-bad:hover:not(:disabled) { background: var(--red); color: white; }
.result-good { border: 1px solid var(--teal); background: var(--teal-light); color: var(--teal); }
.result-good:hover:not(:disabled) { background: var(--teal); color: white; }
.review-toggle {
  display: flex; margin-bottom: 16px;
  border: 1px solid var(--border); border-radius: 99px; overflow: hidden;
}
.toggle-btn {
  flex: 1; padding: 8px 0; font-size: 12px; font-weight: 500;
  border: none; background: none; color: var(--ink3);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.toggle-btn.active { background: var(--ink); color: var(--cream); }

/* Review page */
.review-empty {
  text-align: center; padding: 60px 20px;
  color: var(--ink3); font-size: 14px; line-height: 1.7;
}
.review-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.review-item:hover { border-color: var(--teal); }
.review-jp { font-family: 'Noto Serif JP', serif; font-size: 14px; margin-bottom: 6px; color: var(--ink); }
.review-en { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--teal); }
.review-date { font-size: 11px; color: var(--ink3); margin-top: 6px; }
.review-badge {
  display: inline-block; font-size: 10px;
  padding: 2px 8px; border-radius: 99px;
  background: var(--amber-light); color: var(--amber);
  margin-bottom: 8px;
}
.rechallenge-btn {
  width: 100%; margin-top: 12px;
  padding: 10px; border-radius: 8px;
  border: 1px solid var(--border);
  background: none; color: var(--ink2);
  font-size: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.rechallenge-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-light); }

/* Reading page */
.reading-item {
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.reading-item:last-child { border-bottom: none; }
.reading-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px; color: var(--ink3); margin-bottom: 10px;
}
.reading-en {
  font-family: 'DM Mono', monospace;
  font-size: 16px; line-height: 1.8; color: var(--ink);
}

/* Streak badge */
.streak-section {
  display: flex; align-items: center; gap: 12px;
  background: var(--amber-light);
  border: 1px solid #E8C88A;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.streak-num { font-size: 32px; font-weight: 500; color: var(--amber); line-height: 1; }
.streak-info h3 { font-size: 13px; font-weight: 500; color: var(--amber); }
.streak-info p { font-size: 11px; color: #A06010; margin-top: 2px; }

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--ink3); font-size: 13px; }
.dots { display: inline-flex; gap: 4px; }
.dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); animation: pulse 1.2s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

.api-note {
  font-size: 11px; color: var(--ink3);
  text-align: center; padding: 8px;
  border: 1px dashed var(--border);
  border-radius: 8px; margin-bottom: 12px;
  line-height: 1.5;
}

.today-done {
  background: var(--teal-light);
  border: 1px solid #A8D5CC;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px; color: var(--teal);
  margin-bottom: 12px; text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">英作文 トラッカー</div>
  <div class="streak-pill">
    <span class="streak-fire">🔥</span>
    <span id="header-streak">0日連続</span>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('practice')">練習</button>
  <button class="nav-btn" onclick="showPage('review')">復習</button>
  <button class="nav-btn" onclick="showPage('reading')">音読</button>
</div>

<!-- PRACTICE PAGE -->
<div class="page active" id="page-practice">
  <div class="streak-section">
    <div class="streak-num" id="streak-num">0</div>
    <div class="streak-info">
      <h3>日連続達成中</h3>
      <p id="streak-sub">今日はまだ練習していません</p>
    </div>
  </div>

  <div class="api-note">
    ⚠️ このプロトタイプはClaude APIキーが必要です。<br>
    下の「APIキーを入力」から設定するとAI機能が使えます。
  </div>

  <div id="api-key-section">
    <input type="password" id="api-key-input" placeholder="sk-ant-..." style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;background:var(--card);color:var(--ink);outline:none;margin-bottom:8px;">
    <button onclick="saveApiKey()" style="width:100%;padding:10px;border-radius:10px;border:none;background:var(--ink);color:var(--cream);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px;">APIキーを保存</button>
  </div>

  <div style="margin-bottom:12px;">
    <div class="sentence-label">テーマ（任意）</div>
    <div class="theme-row">
      <span class="theme-chip selected" onclick="selectTheme(this,'セキュリティ Biz')">セキュリティ Biz</span>
      <span class="theme-chip" onclick="selectTheme(this,'ビジネス')">ビジネス</span>
      <span class="theme-chip" onclick="selectTheme(this,'日常')">日常</span>
      <span class="theme-chip" onclick="selectTheme(this,'旅行')">旅行</span>
      <span class="theme-chip" onclick="selectTheme(this,'ニュース')">ニュース</span>
      <span class="theme-chip review-chip" onclick="selectTheme(this,'復習')">復習</span>
    </div>
  </div>

  <div class="sentence-card">
    <div class="sentence-label">今日の問題文</div>
    <div class="japanese-text" id="jp-sentence">「問題を生成」を押してください</div>
    <button class="gen-btn" id="gen-btn" onclick="generateSentence()">＋ 新しい問題文を生成</button>
  </div>

  <div style="margin-bottom:16px;">
    <div class="input-label">あなたの英訳</div>
    <textarea id="user-translation" placeholder="ここに英語を入力..." rows="4"></textarea>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitTranslation()">添削してもらう</button>

  <div id="feedback-area"></div>
</div>

<!-- REVIEW PAGE -->
<div class="page" id="page-review">
  <div id="review-list">
    <div class="review-empty">保存した表現がまだありません。<br>練習後に「保存」を押すと<br>ここに追加されます。</div>
  </div>
</div>

<!-- READING PAGE -->
<div class="page" id="page-reading">
  <div id="reading-list">
    <div class="review-empty">音読素材がまだありません。<br>練習を重ねると<br>ここに例文が並びます。</div>
  </div>
</div>

<script>
let state = {
  apiKey: localStorage.getItem('eikaiwa_apikey') || '',
  streak: parseInt(localStorage.getItem('eikaiwa_streak') || '0'),
  lastDate: localStorage.getItem('eikaiwa_lastdate') || '',
  todayCount: parseInt(localStorage.getItem('eikaiwa_todaycount') || '0'),
  debtDay: localStorage.getItem('eikaiwa_debtday') || '',
  todayDone: false,
  currentJp: '',
  currentFeedback: null,
  theme: 'セキュリティ Biz',
  reviewFilter: 'needs',
  savedItems: JSON.parse(localStorage.getItem('eikaiwa_saved') || '[]'),
};

function todayStr() {
  return new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
}

function dateStr(offsetDays) {
  return new Date(Date.now() + offsetDays * 86400000)
    .toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})
    .replace(/\//g,'-');
}

function initStreak() {
  const today = todayStr();
  const yesterday = dateStr(-1);
  const twoDaysAgo = dateStr(-2);

  if (state.lastDate === today) {
    state.todayDone = state.todayCount >= 1;
  } else if (state.lastDate === yesterday) {
    state.todayCount = 0;
    localStorage.setItem('eikaiwa_todaycount', '0');
  } else if (state.lastDate === twoDaysAgo) {
    state.debtDay = today;
    localStorage.setItem('eikaiwa_debtday', today);
    state.todayCount = 0;
    localStorage.setItem('eikaiwa_todaycount', '0');
  } else if (state.lastDate !== '' && state.lastDate !== today) {
    state.streak = 0;
    state.debtDay = '';
    localStorage.setItem('eikaiwa_streak', '0');
    localStorage.setItem('eikaiwa_debtday', '');
  }
  updateStreakUI();
}

function isDebtActive() {
  return state.debtDay === todayStr();
}

function updateStreakUI() {
  document.getElementById('streak-num').textContent = state.streak;
  document.getElementById('header-streak').textContent = state.streak + '日連続';
  const sub = document.getElementById('streak-sub');
  const existingBadge = document.getElementById('today-done-badge');
  if (existingBadge) existingBadge.remove();

  if (isDebtActive()) {
    const done = state.todayCount;
    sub.textContent = done === 0 ? '昨日サボり — 今日2回で取り返せる' : '1回完了 — あと1回で連続継続！';
    const badge = document.createElement('div');
    badge.id = 'today-done-badge';
    badge.className = 'today-done';
    badge.style.background = 'var(--amber-light)';
    badge.style.borderColor = '#E8C88A';
    badge.style.color = 'var(--amber)';
    badge.textContent = done === 0 ? '穴埋めモード：今日2回練習で連続記録を守れます' : '穴埋め1/2完了 — もう1回練習してください！';
    document.querySelector('.streak-section').after(badge);
  } else if (state.todayDone) {
    sub.textContent = '今日の練習完了！';
    const badge = document.createElement('div');
    badge.id = 'today-done-badge';
    badge.className = 'today-done';
    badge.textContent = '今日の練習は完了しています ✓';
    document.querySelector('.streak-section').after(badge);
  } else {
    sub.textContent = '今日まだ練習していません';
  }
}

function markTodayDone() {
  const today = todayStr();
  const yesterday = dateStr(-1);

  if (isDebtActive()) {
    state.todayCount += 1;
    localStorage.setItem('eikaiwa_todaycount', state.todayCount);
    if (state.todayCount >= 2) {
      state.streak += 1;
      state.todayDone = true;
      state.debtDay = '';
      state.lastDate = today;
      localStorage.setItem('eikaiwa_streak', state.streak);
      localStorage.setItem('eikaiwa_debtday', '');
      localStorage.setItem('eikaiwa_lastdate', today);
    }
    updateStreakUI();
    return;
  }

  if (!state.todayDone) {
    state.todayCount += 1;
    localStorage.setItem('eikaiwa_todaycount', state.todayCount);

    if (state.lastDate === yesterday || state.lastDate === '') {
      state.streak += 1;
    } else if (state.lastDate !== today) {
      state.streak = 1;
    }
    state.todayDone = true;
    state.lastDate = today;
    localStorage.setItem('eikaiwa_streak', state.streak);
    localStorage.setItem('eikaiwa_lastdate', today);
    updateStreakUI();
  }
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key) {
    state.apiKey = key;
    localStorage.setItem('eikaiwa_apikey', key);
    document.getElementById('api-key-section').innerHTML = '<div style="font-size:12px;color:var(--teal);margin-bottom:12px;text-align:center;">✓ APIキーが設定されました</div>';
  }
}

function selectTheme(el, theme) {
  document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.theme = theme;
  document.getElementById('gen-btn').textContent = theme === '復習' ? '別の表現を選択する' : '＋ 新しい問題文を生成';
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'review') renderReview();
  if (name === 'reading') renderReading();
}

async function callClaude(messages, system) {
  if (!state.apiKey) {
    throw new Error('APIキーが設定されていません');
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system, messages })
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  const data = await res.json();
  return data.content[0].text;
}

async function generateSentence() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('user-translation').value = '';

  // 復習モード：needsReview !== false のアイテムからランダム取得
  if (state.theme === '復習') {
    const reviewItems = state.savedItems.filter(i => i.needsReview !== false);
    if (reviewItems.length === 0) {
      document.getElementById('jp-sentence').textContent = '「問題を生成」を押してください';
      btn.disabled = false;
      return;
    }
    const item = reviewItems[Math.floor(Math.random() * reviewItems.length)];
    state.currentJp = item.jp;
    document.getElementById('jp-sentence').textContent = item.jp;
    btn.disabled = false;
    return;
  }

  btn.textContent = '生成中...';

  if (!state.apiKey) {
    const samples = {
      'セキュリティ Biz': [
        'このシステムへの不正アクセスが先週検知されました。',
        'クライアントにリスク評価の結果を報告する必要があります。',
        'パッチを早急に適用しないと、脆弱性が悪用される可能性があります。',
        'セキュリティポリシーの見直しを四半期ごとに実施しています。',
        'インシデント発生時は、まず影響範囲の特定が最優先です。',
      ],
      'ビジネス': ['会議は予定より30分遅れて始まった。','このプロジェクトの締め切りは来週の金曜日です。','ご提案についてご検討いただけますか。'],
      '日常': ['昨日、駅で偶然昔の友人に会った。','彼女は毎朝コーヒーを飲みながら新聞を読む。','先週末は家族で公園にピクニックに行った。'],
      '旅行': ['初めて海外を一人旅したとき、とても緊張した。','その美術館には世界中から観光客が訪れる。','荷物を忘れてホテルに引き返した。'],
      'ニュース': ['その政策は多くの国民から批判を受けている。','新しい技術が医療の現場を変えつつある。','気候変動への対策が急務となっている。'],
    };
    const list = samples[state.theme] || samples['セキュリティ Biz'];
    state.currentJp = list[Math.floor(Math.random()*list.length)];
    document.getElementById('jp-sentence').textContent = state.currentJp;
    btn.disabled = false;
    btn.textContent = '＋ 新しい問題文を生成';
    return;
  }

try {
    const themeCategories = {
      'ビジネス': '会議・報告、メール・連絡、依頼・交渉、スケジュール調整、フィードバック、提案・説明',
      '日常':     '移動・交通、食事・カフェ、家事・生活、友人・家族との会話、体調・気分、趣味・週末、小さなトラブル、独り言',
      '旅行':     'チェックイン・ホテル、道を聞く、レストランでの注文、交通機関、観光・案内、トラブル対応、お土産・ショッピング',
      'ニュース':  '社会・政治、経済・ビジネス、テクノロジー、環境・気候、スポーツ、国際情勢、身近な出来事',
    };
    const themePrompt = state.theme === 'セキュリティ Biz'
      ? `英語アウトプット練習用に、日本語の短文を1文だけ生成してください。
    条件：
      - 15〜25字程度、重くしない
      - 仕事（セキュリティ/会議/クライアント対応）多め、意見系はたまに
      - 毎回異なるシナリオ（報告・依頼・調整・懸念・提案・雑談・意見）からランダムに選ぶ
      - 文だけ返す。説明不要。`
            : `英語アウトプット練習用に、日本語の短文を1文だけ生成してください。
      条件：
      - 15〜25字程度
      - 以下のカテゴリからランダムに1つ選ぶ（毎回違うカテゴリにすること）：${themeCategories[state.theme] || ''}
      - 文だけ返す。説明不要。`;
    const text = await callClaude(
      [{ role: 'user', content: themePrompt }],
      'あなたは英語学習サポーターです。指示通りに日本語文を1文だけ返してください。余計な説明は不要です。'
    );
    state.currentJp = text.trim();
    document.getElementById('jp-sentence').textContent = state.currentJp;
  } catch(e) {
    document.getElementById('jp-sentence').textContent = '※ APIキーを設定してください（デモ文）：昨日、駅で偶然昔の友人に会った。';
    state.currentJp = '昨日、駅で偶然昔の友人に会った。';
  }
  btn.disabled = false;
  btn.textContent = '＋ 新しい問題文を生成';
}

async function submitTranslation() {
  const userEn = document.getElementById('user-translation').value.trim();
  if (!userEn) return;
  if (!state.currentJp || state.currentJp.includes('押してください')) {
    alert('先に問題文を生成してください');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '添削中...';

  const area = document.getElementById('feedback-area');
  area.innerHTML = '<div class="loading"><div class="dots"><span></span><span></span><span></span></div><br>AIが添削しています...</div>';

  if (!state.apiKey) {
    setTimeout(() => {
      const demo = {
        modelAnswer: 'I ran into an old friend at the station yesterday.',
        errors: 'run into（偶然会う）という句動詞を使うと自然です。meetは計画的な場合に使うことが多い。',
        phrases: [{ en: 'run into ~', ja: '〜に偶然会う' }, { en: 'by chance', ja: '偶然に' }]
      };
      state.currentFeedback = { jp: state.currentJp, userEn, ...demo };
      renderFeedback(demo, userEn);
      markTodayDone();
      btn.disabled = false;
      btn.textContent = '添削してもらう';
    }, 1200);
    return;
  }

  try {
    const system = 'あなたは英語添削の専門家です。必ずJSON形式のみで返答してください。余計な説明やコードブロックは不要です。';
    const prompt = `日本語文：${state.currentJp}\n学習者の英訳：${userEn}\n\n以下のJSON形式で返してください：\n{"modelAnswer":"模範英訳","errors":"間違いや改善点の説明（なければ空文字）","phrases":[{"en":"覚えるべき表現","ja":"日本語訳"}]}`;
    const raw = await callClaude([{ role: 'user', content: prompt }], system);
    const clean = raw.replace(/```json|```/g,'').trim();
    const data = JSON.parse(clean);
    state.currentFeedback = { jp: state.currentJp, userEn, ...data };
    renderFeedback(data, userEn);
    markTodayDone();
  } catch(e) {
    area.innerHTML = '<div style="color:var(--red);font-size:13px;padding:12px;">エラーが発生しました。APIキーを確認してください。</div>';
  }
  btn.disabled = false;
  btn.textContent = '添削してもらう';
}

function renderFeedback(data, userEn) {
  const area = document.getElementById('feedback-area');
  const phrasesHtml = (data.phrases||[]).map(p =>
    `<div class="phrase-row"><span class="phrase-en">${p.en}</span><span class="phrase-ja">${p.ja}</span></div>`
  ).join('');

  area.innerHTML = `
    <div class="feedback-card">
      <div class="feedback-section">
        <div class="fb-label correct">あなたの英訳</div>
        <div style="font-family:'DM Mono',monospace;font-size:14px;line-height:1.6;color:var(--ink2);padding:12px;border-radius:8px;background:var(--cream);">${userEn}</div>
      </div>
      <div class="feedback-section">
        <div class="fb-label model">模範訳</div>
        <div class="model-text">${data.modelAnswer}</div>
      </div>
      ${data.errors ? `<div class="feedback-section">
        <div class="fb-label wrong">改善ポイント</div>
        <div class="error-text">${data.errors}</div>
      </div>` : ''}
      ${phrasesHtml ? `<div class="feedback-section">
        <div class="fb-label phrase">覚えるべき表現</div>
        ${phrasesHtml}
      </div>` : ''}
      <div class="result-row">
        <button class="result-btn result-bad" id="result-bad" onclick="markResult('bad')">できなかった</button>
        <button class="result-btn result-good" id="result-good" onclick="markResult('good')">できた</button>
      </div>
      <button class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
  `;
}

function markResult(result) {
  if (!state.currentFeedback) return;
  const needsReview = result === 'bad';
  const item = { ...state.currentFeedback, date: todayStr(), id: Date.now(), needsReview };
  const idx = state.savedItems.findIndex(i => i.jp === item.jp);
  if (idx >= 0) {
    state.savedItems[idx] = item;
  } else {
    state.savedItems.unshift(item);
  }
  localStorage.setItem('eikaiwa_saved', JSON.stringify(state.savedItems));
  document.getElementById('result-bad').disabled = true;
  document.getElementById('result-good').disabled = true;
  const label = result === 'bad' ? 'できなかった ✓' : 'できた ✓';
  document.getElementById('result-' + result).textContent = label;
}

function nextQuestion() {
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('user-translation').value = '';
  state.currentJp = '';
  state.currentFeedback = null;
  document.getElementById('jp-sentence').textContent = '「問題を生成」を押してください';
}

function renderReview() {
  const el = document.getElementById('review-list');
  const isNeeds = state.reviewFilter === 'needs';
  const items = state.savedItems.filter(i => isNeeds ? i.needsReview !== false : i.needsReview === false);

  const toggleHtml = `
    <div class="review-toggle">
      <button class="toggle-btn ${isNeeds ? 'active' : ''}" onclick="setReviewFilter('needs')">要復習</button>
      <button class="toggle-btn ${!isNeeds ? 'active' : ''}" onclick="setReviewFilter('mastered')">習得済み</button>
    </div>`;

  if (items.length === 0) {
    const emptyMsg = isNeeds
      ? '要復習の表現はありません。<br>添削後に「できなかった」を押すと追加されます。'
      : '習得済みの表現はまだありません。';
    el.innerHTML = toggleHtml + `<div class="review-empty">${emptyMsg}</div>`;
    return;
  }

  el.innerHTML = toggleHtml + items.map(item => `
    <div class="review-item">
      <div class="review-badge">${item.needsReview === undefined ? '未評価' : isNeeds ? '要復習' : '習得済み'}</div>
      <div class="review-jp">${item.jp}</div>
      <div class="review-en">${item.modelAnswer}</div>
      <div class="review-date">${item.date} 保存</div>
      <button class="rechallenge-btn" onclick="rechallenge(${item.id})">再チャレンジ ↗</button>
    </div>
  `).join('');
}

function setReviewFilter(filter) {
  state.reviewFilter = filter;
  renderReview();
}

function rechallenge(id) {
  const item = state.savedItems.find(i => i.id === id);
  if (!item) return;
  showPage('practice');
  document.querySelector('.nav-btn').classList.add('active');
  state.currentJp = item.jp;
  document.getElementById('jp-sentence').textContent = item.jp;
  document.getElementById('user-translation').value = '';
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('page-practice').scrollIntoView();
}

function renderReading() {
  const el = document.getElementById('reading-list');
  if (state.savedItems.length === 0) {
    el.innerHTML = '<div class="review-empty">音読素材がまだありません。<br>練習を重ねると<br>ここに例文が並びます。</div>';
    return;
  }
  el.innerHTML = `
    <p style="font-size:12px;color:var(--ink3);margin-bottom:16px;">声に出して読んでみましょう</p>
    ${state.savedItems.map(item => `
      <div class="reading-item">
        <div class="reading-jp">${item.jp}</div>
        <div class="reading-en">${item.modelAnswer}</div>
      </div>
    `).join('')}
  `;
}

if (state.apiKey) {
  document.getElementById('api-key-section').innerHTML = '<div style="font-size:12px;color:var(--teal);margin-bottom:12px;text-align:center;">✓ APIキーが設定されています</div>';
}
initStreak();
</script>
</body>
</html>
